name: CI

on:
  workflow_dispatch:
  push:
    paths:
      - lexicon.xml
      - scripts/validate-lexicon.sh
      - .github/workflows/ci.yaml
  pull_request:
    paths:
      - lexicon.xml
      - scripts/validate-lexicon.sh
      - .github/workflows/ci.yaml

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout Azure lexicon validator
        uses: actions/checkout@v4
        with:
          repository: Azure-Samples/Cognitive-Speech-TTS
          path: tts
          sparse-checkout: |
            CustomLexiconValidation

      - name: Install .NET runtime
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '3.1.x'

      - name: Prepare validator input
        shell: pwsh
        run: |
          $validatorLexicon = '.\lexicon.validator.xml'
          $content = Get-Content .\lexicon.xml -Raw

          # Azure Learn documents custom lexicon with x-microsoft-sapi,
          # but the Azure Samples validator still only accepts sapi.
          $content = $content.Replace('alphabet="x-microsoft-sapi"', 'alphabet="sapi"')

          Set-Content -Path $validatorLexicon -Value $content

      - name: Verify lexicon file
        shell: pwsh
        run: |
          $result = .\tts\CustomLexiconValidation\CustomLexiconValidation.exe -CustomLexiconFilePath .\lexicon.validator.xml -LogFile log.txt
          if ($LASTEXITCODE -ne 0) {
            if (Test-Path .\log.txt) {
              Get-Content .\log.txt | Write-Output
            }

            throw "Custom lexicon validation failed."
          }

          if ($result -notlike "*Custom lexicon file format is correct. Please use it through SSML.*") {
            if (Test-Path .\log.txt) {
              Get-Content .\log.txt | Write-Output
            }

            throw "Validator did not report a successful result."
          }

          Write-Output $result
